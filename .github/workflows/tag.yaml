name: Release container

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Makefile uses `git describe --dirty` to compute IMAGE_TAG.
          # With the default shallow checkout there are no tags visible,
          # git describe returns empty, and IMAGE_TAG silently falls back
          # to `latest` — so on a v*.*.* push the semver-tagged image
          # never gets published, only :latest. fetch-depth=0 pulls the
          # full history + tags so IMAGE_TAG = v0.1.0 (or whatever tag
          # triggered the run).
          fetch-depth: 0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      - name: Build and push multi-arch image
        run: make push
