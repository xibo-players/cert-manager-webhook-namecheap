name: Release container

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Makefile uses `git describe --dirty` to compute IMAGE_TAG.
          # With the default shallow checkout there are no tags visible,
          # git describe returns empty, and IMAGE_TAG silently falls back
          # to `latest` — so on a v*.*.* push the semver-tagged image
          # never gets published, only :latest. fetch-depth=0 pulls the
          # full history + tags so IMAGE_TAG = v0.1.0 (or whatever tag
          # triggered the run).
          fetch-depth: 0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      - name: Build and push multi-arch image
        # Override the Makefile's `git describe`-based IMAGE_TAG with
        # the tag that actually triggered this run. Earlier attempts
        # relying on git describe (even with fetch-depth: 0) got
        # "No annotated tags can describe <sha>" from CI checkouts,
        # and the Makefile's guard silently fell back to IMAGE_TAG=latest
        # — so `:v0.1.0` never landed in GHCR, only `:latest`.
        # github.ref_name on a tag push is the tag's short name (e.g.
        # `v0.1.0`), which is what we want.
        run: make IMAGE_TAG=${{ github.ref_name }} push
